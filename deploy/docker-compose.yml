services:
  mongo:
    image: mongo:7
    container_name: cyanping-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - cyanping

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    container_name: cyanping-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "cyanping"
      CORS_ORIGINS: "*"
      JWT_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_STRING"
    ports:
      - "8001:8001"    # backend API -> http://<server-ip>:8001/api
    # Allow unprivileged ICMP (fping-style) inside the container.
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647
    # NET_RAW is required for the MTR / traceroute feature (and enables
    # privileged ICMP). Safe for a self-hosted monitoring container.
    cap_add:
      - NET_RAW
    networks:
      - cyanping

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
      args:
        # Empty = the frontend calls the API on its OWN origin (/api), which
        # nginx reverse-proxies to the backend container. This works on any
        # server IP with no CORS setup. (Only set a URL here if you serve the
        # backend on a separate hostname.)
        REACT_APP_BACKEND_URL: ""
    container_name: cyanping-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"    # web UI + API proxy -> http://<server-ip>:8080
    networks:
      - cyanping

networks:
  cyanping:

volumes:
  mongo_data:
